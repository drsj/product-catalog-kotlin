services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: product
      POSTGRES_PASSWORD: product
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product -d productdb"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9200'"]
      interval: 10s
      timeout: 5s
      retries: 30
    ports:
      - "9200:9200"

  pricing-mock-service:
    build:
      context: .
      dockerfile: pricing-mock-service/Dockerfile
    ports:
      - "127.0.0.1:9090:9090"
      - "[::1]:9090:9090"

  product-catalog-service:
    build:
      context: .
      dockerfile: product-catalog-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      pricing-mock-service:
        condition: service_started
    ports:
      - "127.0.0.1:8080:8080"
      - "[::1]:8080:8080"